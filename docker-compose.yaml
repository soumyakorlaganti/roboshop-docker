services:
  catalogue:
    build: ./catalogue
    image: soumyadevopsspace/catalogue:1.0.0
    container_name: catalogue
    depends_on: 
    - mongodb
  user:
    build: ./user
    image: soumyadevopsspace/user:1.0.0
    container_name: user
    depends_on:
    - redis
  frontend:
    build: ./frontend
    image: soumyadevopsspace/frontend:1.0.0
    container_name: frontend
    ports:
    - "80:80"
    depends_on:
    - catalogue
    - user
  mongodb:
    build: ./mongodb # It moves to mongodb directory
    image: soumyadevopsspace/mongodb:1.0.0 # docker build -t soumyadevopsspace/mongodb:1.0.0
    container_name: mongodb
  redis:
    image: redis:7.0
    container_name: redis

networks:
  default:
    driver: bridge
    name: roboshop
    external: false # if true, you need to create network manually