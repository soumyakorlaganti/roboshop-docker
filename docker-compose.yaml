services:
  catalogue:
    build:
      context: ./catalogue
      dockerfile: Dockerfile
    image: soumyadevopsspace/catalogue:1.0.0
    container_name: catalogue
    depends_on: 
    - mongodb
  user:
    build:
      dockerfile: user.Dockerfile
    image: soumyadevopsspace/user:1.0.0
    container_name: user
    depends_on:
    - redis
  frontend:
    build:
      dockerfile: frontend.Dockerfile
    image: soumyadevopsspace/frontend:1.0.0
    container_name: frontend
    depends_on:
    - catalogue
    - user
  mongodb:
    build:
      context: ./mongodb
      dockerfile: Dockerfile # It moves to mongodb directory
    image: soumyadevopsspace/mongodb:1.0.0 # docker build -t soumyadevopsspace/mongodb:1.0.0
    container_name: mongodb
  redis:
    image: redis:7.0
    container_name: redis

networks:
  default:
    driver: bridge
    name: roboshop
    external: false # if true, you need to create network manually